# Test profile overrides
spring.profiles.active=test
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true

# H2 in-memory for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA for H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Disable Flyway for tests (using ddl-auto)
spring.flyway.enabled=false

# Demo properties (required by ApplicationProperties)
demo.contentSecurityPolicy=default-src 'self'
demo.allowedOrigins=*
demo.excludedUrls=/api/private
demo.issuerUri=https://test-issuer.example.com
demo.securityHeaderName=Authorization
demo.apiKey=test-api-key
