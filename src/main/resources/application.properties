########## APPLICATION PROPERTIES ##########
spring.application.name=template
spring.banner.location=classpath:banner.txt
spring.profiles.active=${PROFILE:local,dev}

demo.contentSecurityPolicy=default-src 'self'; script-src 'none';
demo.allowedOrigins=https://example.com,http://localhost:*
demo.excludedUrls=/api/private
demo.issuerUri=https://authserver/realme/project
demo.securityHeaderName=Authorization
demo.apiKey=your-api-key
#demo.endpoint.security.header=Authorization
#demo.endpoint.security.key=your-api-key


########## SERVER PROPERTIES ##########
# server.address=0.0.0.0
server.address=localhost
server.port=1947

server.servlet.context-path=/${spring.application.name}

########## DEVTOOLS PROPERTIES ##########
spring.devtools.remote.debug.local-port=8001

########## LOGGING PROPERTIES ##########
# Jackson 3: write_dates_as_timestamps was removed; dates serialize as ISO-8601 by default
# Use default Logback. For Log4j2, exclude spring-boot-starter-logging and add spring-boot-starter-log4j2
# logging.config=classpath:/log4j/log4j2.json
logging.level.root=INFO
logging.level.com.demo=DEBUG
logging.level.org.springframework=INFO

########## SECURITY PROPERTIES ##########
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://authserver/realme/project

########## DATABASE PROPERTIES ##########
spring.datasource.url=jdbc:mysql://localhost:3306/template_bb
spring.datasource.username=root
spring.datasource.password=root!
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Configuration
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.testOnBorrow=true
spring.datasource.connectionTimeout=5000
spring.datasource.validationQuery=SELECT 1

# JPA Properties
spring.jpa.show-sql=true

spring.jpa.hibernate.ddl-auto=none
# Hibernate 7 auto-detects MySQL dialect; uncomment to override:
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

spring.jpa.properties.org.hibernate.envers.store_data_at_delete=true
spring.jpa.generate-ddl=false

# Flyway Migration
spring.flyway.enabled=true
spring.flyway.baselineOnMigrate=true
spring.flyway.validateOnMigrate=true
spring.flyway.locations=classpath:db/migration

########## ACTUATOR PROPERTIES ##########
management.server.port=9000
management.server.address=127.0.0.1

# Security and Management Settings
security.require_ssl=false
shell.ssh.enabled=false
spring.jmx.enabled=false

# Custom Health Check Groups
management.endpoint.health.group.custom.include=diskSpace,ping
management.endpoint.health.group.custom.show-components=always
management.endpoint.health.group.custom.show-details=always

########## ADDITIONAL CONFIGURATION ##########
spring.main.allow-circular-references=true
spring.main.allow-bean-definition-overriding=true
spring.servlet.register-default-servlet=true
spring.mvc.patchmatch.matching-strategy=ANT_PATCH_MATCHER
