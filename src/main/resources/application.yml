spring:
  application:
    name: template
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/template}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root!}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      connection-timeout: 5000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

server:
  port: ${SERVER_PORT:8080}
  address: ${SERVER_ADDRESS:0.0.0.0}
  servlet:
    context-path: /

management:
  server:
    port: ${MANAGEMENT_PORT:9000}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: INFO
    com.demo: INFO
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%-5level requestId=%X{requestId} logger=%logger{36} msg=\"%msg\"%n"

app:
  api:
    base-path: /api/v1
  logging:
    http:
      enabled: false
      max-payload-length: 2048
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: Authorization,Content-Type,X-Requested-With,Accept,Origin
    exposed-headers: Content-Disposition,X-Request-Id
    allow-credentials: true
    max-age-seconds: 600
  security:
    enabled: ${SECURITY_ENABLED:false}
    api-key:
      enabled: ${API_KEY_ENABLED:false}
      header: ${API_KEY_HEADER:X-API-KEY}
      value: ${API_KEY_VALUE:}
    jwt:
      enabled: ${JWT_ENABLED:false}
      issuer-uri: ${JWT_ISSUER_URI:}
      jwk-set-uri: ${JWT_JWK_SET_URI:}
      hmac-secret: ${JWT_HMAC_SECRET:dev-secret-1234567890-1234567890-1234}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
